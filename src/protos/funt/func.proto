syntax = "proto3";
package forge.funt;

import "core/struct.proto";

// A single physics equation
// Example:
//   name   : "/physi/kinematics/acceleration(u,v,t)"
//   input  : "/quant/physia/initial_velocity"
//   input  : "/quant/physia/final_velocity"
//   input  : "/quant/physia/time"
//   output : "/result/phy/acceleration"
message Function {
    string          name   = 1;
    repeated string input  = 2;
    string          output = 3;
}

// Container holding all equations in the library
message FunctionStore {
    repeated Function functions = 1;
}

// Four-way index built from FunctionStore via Stor2Ind()
// i2f : input variable  -> list of function names that need it
// o2f : output variable -> list of function names that produce it
// f2i : function name   -> list of its input variables
// f2o : function name   -> its single output variable
message FuncIndex {
    map<string, forge.core.StrList> i2f = 1;
    map<string, forge.core.StrList> o2f = 2;
    map<string, forge.core.StrList> f2i = 3;
    map<string, string>             f2o = 4;
}
